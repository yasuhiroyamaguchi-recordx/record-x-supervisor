    summary: 初版起案。north_star + values 5 件 + anti_values 7 件 + decision_principles 6 件 + 評価フロー 5 段階 + verdict 4 種類マッピング + 哲学的接続 + 監督官運用。Phase B-α / β 7 日間実証実績で v1.1 改訂前提。
